AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for FastAPI Docker Application Migration'

Parameters:
  YourName:
    Type: String
    Default: 'myname'
    Description: '리소스 이름에 포함될 이름 (예: myname)'
  InstanceType:
    Type: String
    Default: 't2.micro'
    Description: 'EC2 인스턴스 타입 (t2.micro 권장)'
  KeyName:
    Type: String
    Description: '사용할 KeyPair의 이름 (사전에 AWS 콘솔에서 생성되어 있어야 합니다. 예: 본인키페어)'
  LatestUbuntuAmiId:
    Type: 'AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>'
    Default: '/aws/service/canonical/ubuntu/server/22.04/stable/current/amd64/hvm/ebs-gp2/ami-id'
    Description: '최신 Ubuntu 22.04 AMI (자동 조회)'

Resources:
  # =========================================================
  # 01. VPC 생성
  # =========================================================
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.250.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub 'AI-${YourName}-PRD-VPC'

  # =========================================================
  # 04. Internet Gateway 생성
  # =========================================================
  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub 'AI-${YourName}-PRD-IGW'

  AttachGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  # =========================================================
  # 02. Subnet 생성
  # =========================================================
  PublicSubnet2A:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [0, !GetAZs '']  # 1번째 AZ (통상 2a)
      CidrBlock: 10.250.4.0/24
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub 'AI-${YourName}-PRD-VPC-PUB-2A'

  PrivateSubnet2A:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [0, !GetAZs '']
      CidrBlock: 10.250.2.0/24
      Tags:
        - Key: Name
          Value: !Sub 'AI-${YourName}-PRD-VPC-WAS-PRI-2A'

  PublicSubnet2C:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [2, !GetAZs '']  # 3번째 AZ (통상 2c)
      CidrBlock: 10.250.12.0/24
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub 'AI-${YourName}-PRD-VPC-PUB-2C'

  PrivateSubnet2C:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [2, !GetAZs '']
      CidrBlock: 10.250.14.0/24
      Tags:
        - Key: Name
          Value: !Sub 'AI-${YourName}-PRD-VPC-WAS-PRI-2C'

  # =========================================================
  # 05. NAT GATEWAY 생성 (2A에만 배치)
  # =========================================================
  NatEIP2A:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc

  NatGateway2A:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NatEIP2A.AllocationId
      SubnetId: !Ref PublicSubnet2A
      Tags:
        - Key: Name
          Value: !Sub 'AI-${YourName}-PRD-NGW-2A'

  # =========================================================
  # 03. Routing 테이블 생성
  # =========================================================
  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub 'AI-${YourName}-PRD-RT-PUB'

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: AttachGateway
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  RTAssociationPub2A:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2A
      RouteTableId: !Ref PublicRouteTable

  RTAssociationPub2C:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2C
      RouteTableId: !Ref PublicRouteTable

  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub 'AI-${YourName}-PRD-RT-PRI'

  PrivateRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGateway2A

  RTAssociationPri2A:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet2A
      RouteTableId: !Ref PrivateRouteTable

  RTAssociationPri2C:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet2C
      RouteTableId: !Ref PrivateRouteTable

  # =========================================================
  # Security Groups
  # =========================================================
  PublicSecurityGroup2A:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow 80, 443, 22 for Public 2A
      VpcId: !Ref VPC
      GroupName: !Sub 'AI-${YourName}-PRD-VPC-PUB-SG-2A'
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub 'AI-${YourName}-PRD-VPC-PUB-SG-2A'

  PublicSecurityGroup2C:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow 80, 443 for Public 2C
      VpcId: !Ref VPC
      GroupName: !Sub 'AI-${YourName}-PRD-PUB-SG-2C'
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub 'AI-${YourName}-PRD-PUB-SG-2C'

  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow 80, 443 for ALB
      VpcId: !Ref VPC
      GroupName: !Sub 'AI-${YourName}-PRD-ALB-SG'
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub 'AI-${YourName}-PRD-ALB-SG'

  PrivateSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow traffic from ALB to WAS
      VpcId: !Ref VPC
      GroupName: !Sub 'AI-${YourName}-PRD-VPC-WAS-PRI-SG-2A'
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          SourceSecurityGroupId: !GetAtt ALBSecurityGroup.GroupId
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          SourceSecurityGroupId: !GetAtt ALBSecurityGroup.GroupId
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          SourceSecurityGroupId: !GetAtt PublicSecurityGroup2A.GroupId
      Tags:
        - Key: Name
          Value: !Sub 'AI-${YourName}-PRD-VPC-WAS-PRI-SG-2A'
